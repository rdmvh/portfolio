<script>


function size(){
$('#ball').style.width=$('#ball').getBoundingClientRect().width*2
$('#ball').style.height=$('#ball').getBoundingClientRect().height*2
}


function test(){
const ele = document.getElementById('RIGHT');
m = $('#ball').getBoundingClientRect().width - $('#RIGHT').offsetWidth
a = $('#ball').getBoundingClientRect().height - $('#RIGHT').offsetHeight

ele.scrollTop = a/2;
ele.scrollLeft = m/2;
}


document.addEventListener('DOMContentLoaded', function() {
    const ele = document.getElementById('RIGHT');

	ele.scrollTop  = ($('#ball').getBoundingClientRect().height - $('#RIGHT').offsetHeight)/2;
    ele.scrollLeft = ($('#ball').getBoundingClientRect().width - $('#RIGHT').offsetWidth)/2;

    ele.style.cursor = 'grab';

    let pos = { top: 0, left: 0, x: 0, y: 0 };

    const mouseDownHandler = function(e) {
        ele.style.cursor = 'grabbing';
        ele.style.userSelect = 'none';

        pos = {
            left: ele.scrollLeft,
            top: ele.scrollTop,
            x: e.clientX,
            y: e.clientY,
        };

        document.addEventListener('mousemove', mouseMoveHandler);
        document.addEventListener('mouseup', mouseUpHandler);
    };

    const mouseMoveHandler = function(e) {
        const dx = e.clientX - pos.x;
        const dy = e.clientY - pos.y;
        ele.scrollTop = pos.top - dy;
        ele.scrollLeft = pos.left - dx;
		
    };

    const mouseUpHandler = function() {
        ele.style.cursor = 'grab';
        ele.style.removeProperty('user-select');

        document.removeEventListener('mousemove', mouseMoveHandler);
        document.removeEventListener('mouseup', mouseUpHandler);
    };

    ele.addEventListener('mousedown', mouseDownHandler);
});
</script>






<script>
function $(e){return document.querySelector(e);}

var d = '';


var xs = [];
var v = -1000;
for(i=0;i< 201;i++){
xs[i] = v;
v +=10;
}


var ys = [];
var xsn = [];

sqsize = 38;

function simple(){

ys = [];

for(i=0;i<xs.length;i++){
ys[i] = math.evaluate($('#exp').value.replaceAll('x','('+xs[i]/sqsize+')'))*sqsize;
ys[i]=Math.ceil(ys[i])

ys[i] *=-1;

m = $('#ball').getBoundingClientRect().width 
a = $('#ball').getBoundingClientRect().height

xsn[i] = xs[i]+ m/2;
ys[i] += a/2;
}


d =`
M ${xsn[0]},${ys[0]} `;

for(i=1;i<xs.length;i++){
d +=`L ${xsn[i]},${ys[i]} `;
}

//d +=`Z`;

$('#curve').setAttribute('d',d);

}


//simple()


function resizeplus(){
sqsize=sqsize*2;
nm*= 2;
simple()
drawrule()
}


function resizeminus(){
sqsize=sqsize/2;
nm/= 2;

simple()
drawrule()
}

$('#RIGHT').addEventListener('scroll', function() {})


function scrlto(x,opts=[],defs=[]){

$('#identity').innerHTML=x.innerHTML;
$('#opts').innerHTML='';


var tmpexp = $('#prexp').value;

for(i=0;i<opts.length;i++){
$('#opts').innerHTML+="<p>`"+opts[i]+"`:</p><input  vl="+opts[i]+" id=sld"+opts[i]+" oninput=slide(this) onchange=endslide() type='range' min=0 max=100 value="+defs[i]+" class=slider>";

tmpexp = tmpexp.replaceAll(opts[i],$("#sld"+opts[i]).value);

}
$('#exp').value = tmpexp;

$('#current').innerHTML="`f(x)="+tmpexp+"`";


$('#LEFT').scrollTo($('#LEFT').offsetWidth*2, 0)

var math = document.getElementById("opts");
MathJax.Hub.Queue(["Typeset",MathJax.Hub,math]);

var math = document.getElementById("current");
MathJax.Hub.Queue(["Typeset",MathJax.Hub,math]);
}


function slide(x){

var tmpexp = $('#prexp').value;

v = $('#opts').getElementsByTagName('input');
for(i=0;i<v.length;i++){

tmpexp = tmpexp.replaceAll(v[i].getAttribute('vl'),v[i].value/10);

}

$('#exp').value = tmpexp;


simple();

}

function endslide(){

$('#current').innerHTML="`f(x)="+$('#exp').value+"`";


var math = document.getElementById("current");
MathJax.Hub.Queue(["Typeset",MathJax.Hub,math]);

}





var nm=1;

function drawrule(){

$('#rule').innerHTML='';
v = ($('#ball').getBoundingClientRect().height/2);
z = ($('#ball').getBoundingClientRect().width/2) 
$('#rule').innerHTML+="<text class=small x="+(z+10)+"  y="+(v+20)+">0</text>"

for(i=2;i<30;i+=2){$('#rule').innerHTML+="<text class=small x="+(z+(i*38))+"  y="+(v+20)+">"+i/nm+"</text>";}

for(i=-2;i>-30;i-=2){$('#rule').innerHTML+="<text class=small x="+(z+(i*38))+"  y="+(v+20)+">"+i/nm+"</text>";}

for(i=2;i<30;i+=2){$('#rule').innerHTML+="<text class=small x="+(z+10)+"  y="+(v+(i*38))+">"+(-i/nm)+"</text>";}

for(i=-2;i>-30;i-=2){$('#rule').innerHTML+="<text class=small x="+(z+10)+"  y="+(v+(i*38))+">"+(-i/nm)+"</text>";}
}

drawrule();

</script>
